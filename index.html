<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DR OCR PDF Processor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 30px;
}

h2 {
    text-align: center;
}

#dropZone {
    height: 240px;
    border: 3px dashed #0078d7;
    border-radius: 12px;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    cursor: pointer;
    margin-bottom: 20px;
}

#dropZone.dragover {
    background: #e8f3ff;
}

#summary {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    font-family: Consolas, monospace;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: left;
    font-size: 14px;
}

th {
    background: #0078d7;
    color: white;
}

.status-processing {
    color: #d98200;
    font-weight: bold;
}

.status-success {
    color: green;
    font-weight: bold;
}

.status-error {
    color: red;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>DR OCR PDF Processor</h2>

<div id="dropZone">
    Drag & Drop PDF Files Here
</div>

<div id="summary">
    Loading libraries...
</div>

<table>
    <thead>
        <tr>
            <th>#</th>
            <th>Original File</th>
            <th>Detected DR No.</th>
            <th>New File Name</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="fileList"></tbody>
</table>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const dropZone = document.getElementById("dropZone");
const summary = document.getElementById("summary");
const fileList = document.getElementById("fileList");

let fileCounter = 0;

window.onload = function () {
    summary.innerHTML =
        "PDF.js: " + typeof pdfjsLib +
        "<br>Tesseract: " + typeof Tesseract +
        "<br><br>Waiting for PDF files...";
};

dropZone.addEventListener("dragover", function(e) {
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", function() {
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", async function(e) {
    e.preventDefault();
    dropZone.classList.remove("dragover");

    const files = Array.from(e.dataTransfer.files);

    if (files.length === 0) {
        return;
    }

    if (typeof pdfjsLib === "undefined") {
        summary.innerHTML = "❌ PDF.js is not loaded.";
        return;
    }

    if (typeof Tesseract === "undefined") {
        summary.innerHTML = "❌ Tesseract is not loaded.";
        return;
    }

    summary.innerHTML =
        "Processing " + files.length + " file(s)...<br>" +
        "Note: OCR is slower because the app reads the image inside the PDF.";

    for (const file of files) {
        fileCounter++;

        const row = addFileRow(fileCounter, file.name);

        if (file.type !== "application/pdf") {
            updateRow(row, "", "", "❌ Not a PDF", "status-error");
            continue;
        }

        await processPDF(file, row);
    }

    summary.innerHTML += "<br><br>✅ Finished processing batch.";
});

function addFileRow(number, fileName) {
    const row = document.createElement("tr");

    row.innerHTML =
        "<td>" + number + "</td>" +
        "<td>" + escapeHtml(fileName) + "</td>" +
        "<td class='dr'></td>" +
        "<td class='newname'></td>" +
        "<td class='status status-processing'>Queued</td>";

    fileList.appendChild(row);

    return row;
}

function updateRow(row, drNo, newName, status, statusClass) {
    row.querySelector(".dr").textContent = drNo || "";
    row.querySelector(".newname").textContent = newName || "";

    const statusCell = row.querySelector(".status");
    statusCell.textContent = status;
    statusCell.className = "status " + statusClass;
}

async function processPDF(file, row) {
    try {
        updateRow(row, "", "", "Reading PDF...", "status-processing");

        const arrayBuffer = await file.arrayBuffer();

        const pdfData = new Uint8Array(arrayBuffer.slice(0));

        const pdf = await pdfjsLib.getDocument({
            data: pdfData
        }).promise;

        let bestResult = {
            drNumber: null,
            text: "",
            rotation: null,
            score: 0
        };

        /*
          Speed setting:
          Since your file was upside down, we try 0° and 180° only.
          This is faster than checking 0, 90, 180, 270.
        */
        const rotations = [0, 180];

        /*
          Speed setting:
          DR number is normally on page 1.
          This version OCRs page 1 first. If your DR is always on page 1,
          this is much faster.
        */
        const maxPagesToScan = Math.min(pdf.numPages, 1);

        for (let pageNo = 1; pageNo <= maxPagesToScan; pageNo++) {
            const page = await pdf.getPage(pageNo);

            for (const rotation of rotations) {
                updateRow(
                    row,
                    "",
                    "",
                    "OCR Page " + pageNo + " Rotation " + rotation + "°...",
                    "status-processing"
                );

                const text = await ocrPage(page, rotation);
                const result = extractDRNumber(text);

                if (result.score > bestResult.score) {
                    bestResult = {
                        drNumber: result.drNumber,
                        text: text,
                        rotation: rotation,
                        score: result.score
                    };
                }

                if (result.score >= 100) {
                    break;
                }
            }

            if (bestResult.score >= 100) {
                break;
            }
        }

        console.log("===== OCR TEXT FOR " + file.name + " =====");
        console.log(bestResult.text);
        console.log("Best rotation:", bestResult.rotation);
        console.log("Detected DR:", bestResult.drNumber);

        if (!bestResult.drNumber) {
            updateRow(
                row,
                "",
                "",
                "❌ DR Number Not Found",
                "status-error"
            );

            return;
        }

        const newFileName = bestResult.drNumber + ".pdf";

        /*
          Important:
          This downloads the ORIGINAL uploaded PDF.
          It does not rebuild the PDF, so the new file will not be empty.
        */
        downloadOriginalFile(file, newFileName);

        updateRow(
            row,
            bestResult.drNumber,
            newFileName,
            "✅ Downloaded | Rotation " + bestResult.rotation + "°",
            "status-success"
        );

    } catch (error) {
        console.error(error);

        updateRow(
            row,
            "",
            "",
            "❌ Error: " + error.message,
            "status-error"
        );
    }
}

async function ocrPage(page, rotation) {
    const viewport = page.getViewport({
        scale: 3,
        rotation: rotation
    });

    const canvas = document.createElement("canvas");
    const context = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({
        canvasContext: context,
        viewport: viewport
    }).promise;

    const result = await Tesseract.recognize(
        canvas,
        "eng"
    );

    return result.data.text || "";
}

function extractDRNumber(text) {
    const cleanText = text
        .replace(/[|]/g, " ")
        .replace(/\s+/g, " ")
        .trim();

    let match;
    let drNumber;

    /*
      Strong match:
      DR No 5001178516
      DR NO: 5001178516
      DR Number 5001178516
      DR# 5001178516
    */
    match = cleanText.match(
        /D\s*R\s*(?:No|NO|N0|Number|#)?[\s.:#-]{0,20}([0-9][0-9\s-]{7,20})/i
    );

    if (match) {
        drNumber = match[1].replace(/\D/g, "");

        if (drNumber.length >= 8) {
            return {
                drNumber: drNumber,
                score: 100
            };
        }
    }

    /*
      Secondary match:
      any number near DR text.
    */
    match = cleanText.match(
        /DR[\s\S]{0,100}?([0-9][0-9\s-]{7,20})/i
    );

    if (match) {
        drNumber = match[1].replace(/\D/g, "");

        if (drNumber.length >= 8) {
            return {
                drNumber: drNumber,
                score: 90
            };
        }
    }

    /*
      Fallback:
      Eagle Cement DR numbers from your sample start with 500.
    */
    const possibleNumbers = cleanText.match(/[0-9][0-9\s-]{7,20}[0-9]/g);

    if (possibleNumbers) {
        const cleanedNumbers = possibleNumbers
            .map(n => n.replace(/\D/g, ""))
            .filter(n => n.length >= 8);

        const startsWith500 = cleanedNumbers.find(n => n.startsWith("500"));

        if (startsWith500) {
            return {
                drNumber: startsWith500,
                score: 80
            };
        }

        if (cleanedNumbers.length > 0) {
            return {
                drNumber: cleanedNumbers[0],
                score: 40
            };
        }
    }

    return {
        drNumber: null,
        score: 0
    };
}

function downloadOriginalFile(file, newFileName) {
    const url = URL.createObjectURL(file);

    const link = document.createElement("a");
    link.href = url;
    link.download = newFileName;

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    URL.revokeObjectURL(url);
}

function escapeHtml(text) {
    return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}
</script>

</body>
</html>
