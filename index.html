<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DR OCR PDF Processor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 30px;
}

h2 {
    text-align: center;
}

#dropZone {
    height: 260px;
    border: 3px dashed #0078d7;
    border-radius: 12px;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    cursor: pointer;
}

#dropZone.dragover {
    background: #e8f3ff;
}

#status {
    margin-top: 20px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    white-space: pre-wrap;
    font-family: Consolas, monospace;
    font-size: 14px;
}
</style>
</head>

<body>

<h2>DR OCR PDF Processor</h2>

<div id="dropZone">
    Drag & Drop PDF Files Here
</div>

<div id="status">Waiting for PDF...</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const dropZone = document.getElementById("dropZone");
const statusDiv = document.getElementById("status");

window.onload = function () {
    statusDiv.innerHTML =
        "PDF.js: " + typeof pdfjsLib +
        "\nTesseract: " + typeof Tesseract +
        "\n\nWaiting for PDF...";
};

dropZone.addEventListener("dragover", function(e) {
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", function() {
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", async function(e) {
    e.preventDefault();
    dropZone.classList.remove("dragover");

    const files = e.dataTransfer.files;

    if (files.length === 0) return;

    statusDiv.innerHTML =
        "PDF.js: " + typeof pdfjsLib +
        "\nTesseract: " + typeof Tesseract +
        "\n\nProcessing " + files.length + " file(s)...\n";

    if (typeof pdfjsLib === "undefined") {
        statusDiv.innerHTML += "\n❌ PDF.js is not loaded.";
        return;
    }

    if (typeof Tesseract === "undefined") {
        statusDiv.innerHTML += "\n❌ Tesseract is not loaded.";
        return;
    }

    for (const file of files) {
        if (file.type !== "application/pdf") {
            statusDiv.innerHTML += "\n❌ Not a PDF: " + file.name;
            continue;
        }

        await processPDF(file);
    }
});

async function processPDF(file) {
    try {
        statusDiv.innerHTML += "\n\n📄 Processing: " + file.name;

        const buffer = await file.arrayBuffer();

        const pdf = await pdfjsLib.getDocument({
            data: buffer
        }).promise;

        let bestResult = {
            drNumber: null,
            text: "",
            rotation: null,
            score: 0
        };

        const rotations = [0, 90, 180, 270];

        for (let pageNo = 1; pageNo <= pdf.numPages; pageNo++) {
            const page = await pdf.getPage(pageNo);

            for (const rotation of rotations) {
                statusDiv.innerHTML +=
                    "\n🔍 OCR Page " + pageNo + " Rotation " + rotation + "°";

                const text = await ocrPage(page, rotation);

                const result = extractDRNumber(text);

                if (result.score > bestResult.score) {
                    bestResult = {
                        drNumber: result.drNumber,
                        text: text,
                        rotation: rotation,
                        score: result.score
                    };
                }

                if (result.score >= 100) {
                    break;
                }
            }

            if (bestResult.score >= 100) {
                break;
            }
        }

        console.log("===== BEST OCR TEXT =====");
        console.log(bestResult.text);
        console.log("Best rotation:", bestResult.rotation);
        console.log("Best DR:", bestResult.drNumber);

        if (!bestResult.drNumber) {
            statusDiv.innerHTML += "\n❌ DR Number Not Found: " + file.name;
            statusDiv.innerHTML += "\n\n===== OCR TEXT PREVIEW =====\n";
            statusDiv.innerHTML += bestResult.text.substring(0, 3000);
            return;
        }

        downloadRenamedPDF(buffer, bestResult.drNumber + ".pdf");

        statusDiv.innerHTML +=
            "\n✅ " + file.name +
            " → " + bestResult.drNumber + ".pdf" +
            "\nBest Rotation Used: " + bestResult.rotation + "°";

    } catch (error) {
        console.error(error);
        statusDiv.innerHTML +=
            "\n❌ Error processing " + file.name + ": " + error.message;
    }
}

async function ocrPage(page, rotation) {
    const viewport = page.getViewport({
        scale: 3,
        rotation: rotation
    });

    const canvas = document.createElement("canvas");
    const context = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({
        canvasContext: context,
        viewport: viewport
    }).promise;

    const result = await Tesseract.recognize(
        canvas,
        "eng"
    );

    return result.data.text || "";
}

function extractDRNumber(text) {
    const cleanText = text
        .replace(/[|]/g, " ")
        .replace(/\s+/g, " ")
        .trim();

    let match;
    let drNumber = null;
    let score = 0;

    // Strongest match: DR No followed by number
    match = cleanText.match(/D\s*R\s*(?:No|NO|N0|Number|#)?[\s.:#-]{0,15}([0-9][0-9\s-]{7,20})/i);

    if (match) {
        drNumber = match[1].replace(/\D/g, "");

        if (drNumber.length >= 8) {
            score = 100;
            return { drNumber, score };
        }
    }

    // Eagle Cement DRs usually start with 500
    const possibleNumbers = cleanText.match(/[0-9][0-9\s-]{7,20}[0-9]/g);

    if (possibleNumbers) {
        const cleanedNumbers = possibleNumbers
            .map(n => n.replace(/\D/g, ""))
            .filter(n => n.length >= 8);

        const startsWith500 = cleanedNumbers.find(n => n.startsWith("500"));

        if (startsWith500) {
            return {
                drNumber: startsWith500,
                score: 80
            };
        }

        if (cleanedNumbers.length > 0) {
            return {
                drNumber: cleanedNumbers[0],
                score: 40
            };
        }
    }

    return {
        drNumber: null,
        score: 0
    };
}

function downloadRenamedPDF(buffer, fileName) {
    const blob = new Blob(
        [buffer],
        { type: "application/pdf" }
    );

    const url = URL.createObjectURL(blob);

    const link = document.createElement("a");
    link.href = url;
    link.download = fileName;

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    URL.revokeObjectURL(url);
}
</script>

</body>
</html>
